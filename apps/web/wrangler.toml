name = "kabut-tipis-web"
account_id = "affb450d746e53150028bb763b2f640c"
main = "dist/server/index.js"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[assets]
directory = "dist/client"
binding = "ASSETS"
not_found_handling = "none"
html_handling = "auto-trailing-slash"

[[rules]]
type = "ESModule"
globs = ["**/*.js", "**/*.mjs"]

routes = [
  { pattern = "kabuttipis.badry.asia/*", zone_id = "6bc692d5ce98d6e58f9be47ef65b5193" }
]

[vars]
CORS_ORIGIN = "https://kabuttipis.badry.asia"
